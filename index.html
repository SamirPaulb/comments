<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comment Widget Test Bench</title>
  <style>
    :root {
      --bg: #F7F8FB;
      --surface: #FFF;
      --text: #14171F;
      --text-muted: #5B6472;
      --border: #E3E6EC;
      --accent: #4F46E5;
      --accent-soft: #EEF0FF;
    }

    html[data-theme="dark"] {
      --bg: #0F1117;
      --surface: #161A23;
      --text: #E7E9EE;
      --text-muted: #9AA3B2;
      --border: #262B36;
      --accent-soft: #1B1E2E;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      margin: 0;
      line-height: 1.5;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 4vw, 28px);
    }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-soft);
    }

    details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    details[data-id="giscus"] {
      border-top: 3px solid #8957E5;
    }

    details[data-id="waline"] {
      border-top: 3px solid #0E9F6E;
    }

    details[data-id="telegram"] {
      border-top: 3px solid #29A9EA;
    }

    details[data-id="utterances"] {
      border-top: 3px solid #E34C26;
    }

    summary {
      padding: 16px 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      background: var(--surface);
    }

    summary:hover {
      background: var(--accent-soft);
    }

    .sub {
      font-weight: normal;
      font-size: 13px;
      color: var(--text-muted);
      display: block;
      margin-top: 4px;
    }

    .mount {
      padding: 20px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Comment Widget Test Bench</h1>
      <button id="theme-toggle">🌓 Toggle Theme</button>
    </header>

    <details data-id="giscus">
      <summary>Giscus <span class="sub">GitHub Discussions · SamirPaulb/comments</span></summary>
      <div class="mount" id="giscus-mount"></div>
    </details>

    <details data-id="utterances">
      <summary>Utterances <span class="sub">GitHub Issues · SamirPaulb/comments</span></summary>
      <div class="mount" id="utterances-mount"></div>
    </details>

    <details data-id="telegram">
      <summary>comments.app <span class="sub">Telegram-based widget</span></summary>
      <div class="mount" id="telegram-mount"></div>
    </details>

    <details data-id="waline">
      <summary>Waline <span class="sub">Self-hosted · comment-core.vercel.app</span></summary>
      <div class="mount" id="waline-mount"></div>
    </details>
  </div>

  <script>
    // Theme setup
    let theme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", theme);

    document.getElementById("theme-toggle").onclick = () => {
      theme = theme === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);

      const g = document.querySelector("iframe.giscus-frame");
      if (g) g.contentWindow.postMessage({ giscus: { setConfig: { theme } } }, "https://giscus.app");

      const u = document.querySelector(".utterances-frame");
      if (u) u.contentWindow.postMessage({ type: "set-theme", theme: theme === "dark" ? "github-dark" : "github-light" }, "https://utteranc.es");
    };

    // Script injector
    const addScript = (id, src, attrs) => {
      const s = document.createElement("script");
      s.src = src; s.async = true;
      Object.entries(attrs).forEach(([k, v]) => s.setAttribute(k, v));
      document.getElementById(id).appendChild(s);
    };

    // Load Giscus
    addScript("giscus-mount", "https://giscus.app/client.js", {
      "data-repo": "SamirPaulb/comments", "data-repo-id": "R_kgDOQLe9bw",
      "data-category": "", "data-category-id": "DIC_kwDOQLe9b84CxN4R",
      "data-mapping": "pathname", "data-strict": "0", "data-reactions-enabled": "1",
      "data-emit-metadata": "1", "data-input-position": "top", "data-theme": theme,
      "crossorigin": "anonymous"
    });

    // Load Utterances
    addScript("utterances-mount", "https://utteranc.es/client.js", {
      "repo": "SamirPaulb/comments", "issue-term": "pathname",
      "theme": theme === "dark" ? "github-dark" : "github-light",
      "crossorigin": "anonymous"
    });

    // Load Telegram
    addScript("telegram-mount", "https://comments.app/js/widget.js?3", {
      "data-comments-app-website": "RplxspNA", "data-limit": "10",
      "data-dislikes": "1", "data-colorful": "1"
    });

    // Load Waline
    const wCss = document.createElement("link");
    wCss.rel = "stylesheet"; wCss.href = "https://unpkg.com/@waline/client@v3/dist/waline.css";
    document.head.appendChild(wCss);

    import("https://unpkg.com/@waline/client@v3/dist/waline.js").then(mod => {
      mod.init({
        el: "#waline-mount", serverURL: "https://comment-core.vercel.app",
        comment: true, pageview: false, login: "disable", dark: 'html[data-theme="dark"]',
        meta: ["nick", "mail"], requiredMeta: ["nick", "mail"], wordLimit: 250,
        imageUploader: false, highlighter: false, texRenderer: false, search: false, reaction: false,
        emoji: ["//unpkg.com/@waline/emojis@1.1.0/weibo"], turnstileKey: "0x4AAAAAAB_ij-DURoZrsVaD"
      });
    });
  </script>
</body>

</html>
